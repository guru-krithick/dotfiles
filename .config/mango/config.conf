# ── Appearance ────────────────────────────────────────────────────────────────

# Colors — monochrome grey palette (0xRRGGBBff)
rootcolor=0x222222ff
bordercolor=0x222222ff
focuscolor=0x393939ff
urgentcolor=0xa08080ff
scratchpadcolor=0x4a4a4aff

# Borders & gaps
borderpx=2
gappih=4
gappiv=4
gappoh=2
gappov=2
no_border_when_single=1

# Scroller layout — niri-like left-to-right behaviour
scroller_structs=0
scroller_focus_center=0
scroller_default_proportion=1.0
scroller_proportion_preset=0.33,0.5,0.67,1.0

# Visuals (swayfx equivalents)
border_radius=12
blur=1
blur_optimized=1
blur_params_num_passes=3
blur_params_radius=10
blur_params_noise=0.05
blur_params_brightness=1.0
blur_params_saturation=1.1
shadows=0

# Opacity — 0.95 unfocused matches swayfx's default_dim_inactive 0.05
focused_opacity=1.0
unfocused_opacity=0.95

# Animations
animations=1
animation_type_open=slide
animation_type_close=slide
animation_duration_open=300
animation_duration_close=300
animation_duration_move=250
animation_duration_tag=250
animation_curve_open=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1

# Behaviour
focus_on_activate=1
sloppyfocus=0
warpcursor=0
single_scratchpad=1

# ── Autostart ─────────────────────────────────────────────────────────────────

# GTK theming
exec-once=gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once=gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec-once=gsettings set org.gnome.desktop.interface cursor-theme 'default'
exec-once=gsettings set org.gnome.desktop.interface cursor-size 24
exec-once=gsettings set org.gnome.desktop.interface font-name 'Sans 10'

# DBus / portals
exec-once=dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots
exec-once=/usr/lib/xdg-desktop-portal-gtk

# Clipboard
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store

# Bar & notifications
exec-once=swaybg -i ~/Pictures/wallpaper.jpg -m fill
exec-once=waybar
exec-once=mako

# Idle management — wlopm replaces swaymsg "output * power off"
exec-once=swayidle -w timeout 300 'swaylock -f -C ~/.config/swaylock/config' timeout 600 'wlopm --off "*"' resume 'wlopm --on "*"' before-sleep 'swaylock -f -C ~/.config/swaylock/config'

# ── Inputs ────────────────────────────────────────────────────────────────────

# Keyboard
repeat_delay=300
repeat_rate=30
numlockon=0
xkb_rules_layout=us
xkb_rules_options=caps:escape

# Touchpad
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
scroll_method=1
trackpad_accel_profile=1
trackpad_accel_speed=0.25

# Cursor
cursor_size=24
cursor_theme=default

# ── Outputs ───────────────────────────────────────────────────────────────────

# External: Dell S2425HSM 24" (left) — tags 1-5
# Built-in: AU Optronics 14" (right)  — tags 6-9
monitorrule=name:^HDMI-A-1$,width:1920,height:1080,refresh:120,x:0,y:0,scale:1
monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:60,x:1920,y:0,scale:1

# Global fallback — scroller on any monitor for all tags
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# Tags 1-5 → external monitor, scroller layout
tagrule=id:1,monitor_name:HDMI-A-1,layout_name:scroller
tagrule=id:2,monitor_name:HDMI-A-1,layout_name:scroller
tagrule=id:3,monitor_name:HDMI-A-1,layout_name:scroller
tagrule=id:4,monitor_name:HDMI-A-1,layout_name:scroller
tagrule=id:5,monitor_name:HDMI-A-1,layout_name:scroller

# Tags 6-9 → laptop screen, scroller layout
tagrule=id:6,monitor_name:eDP-1,layout_name:scroller
tagrule=id:7,monitor_name:eDP-1,layout_name:scroller
tagrule=id:8,monitor_name:eDP-1,layout_name:scroller
tagrule=id:9,monitor_name:eDP-1,layout_name:scroller

# ── Window Rules ──────────────────────────────────────────────────────────────

# Dialogs / pop-ups
windowrule=isfloating:1,title:.*[Dd]ialog.*
windowrule=isfloating:1,title:.*[Pp]references.*
windowrule=isfloating:1,title:Authentication Required

# Media
windowrule=isfloating:1,isglobal:1,appid:mpv
windowrule=isfloating:1,isglobal:1,width:640,height:360,offsetx:65,offsety:65,title:Picture-in-Picture

# Image viewer
windowrule=isfloating:1,appid:imv

# System tools
windowrule=isfloating:1,width:800,height:600,appid:pavucontrol
windowrule=isfloating:1,width:700,height:500,appid:blueman-manager
windowrule=isfloating:1,appid:nm-connection-editor
windowrule=isfloating:1,appid:.blueman-manager-wrapped

# Thunar dialogs
windowrule=isfloating:1,appid:thunar,title:File Operation Progress
windowrule=isfloating:1,appid:thunar,title:Confirm to replace files
windowrule=isfloating:1,appid:thunar,title:Rename.*

# Browser dialogs
windowrule=isfloating:1,appid:firefox,title:Library
windowrule=isfloating:1,appid:firefox,title:About Mozilla Firefox
windowrule=isfloating:1,appid:firefox,title:Firefox — Sharing Indicator
windowrule=isfloating:1,appid:chromium,title:Save File
windowrule=isfloating:1,appid:zen.*,title:Library

# Polkit / auth
windowrule=isfloating:1,appid:gcr-prompter
windowrule=isfloating:1,appid:polkit-gnome-authentication-agent-1

# Launchers
windowrule=isfloating:1,appid:wofi
windowrule=isfloating:1,appid:wmenu

# Postman (XWayland)
windowrule=isfloating:1,appid:Postman

# Opacity — focused / unfocused (unfocused = app_opacity * global 0.95)
windowrule=focused_opacity:0.92,unfocused_opacity:0.87,appid:com.mitchellh.ghostty
windowrule=focused_opacity:0.95,unfocused_opacity:0.90,appid:code
windowrule=focused_opacity:0.95,unfocused_opacity:0.90,appid:org.pwmt.zathura
windowrule=focused_opacity:0.98,unfocused_opacity:0.93,appid:libreoffice-.*
windowrule=focused_opacity:0.98,unfocused_opacity:0.93,appid:soffice

# Ghostty named windows
windowrule=isfloating:1,width:1200,height:800,appid:com.mitchellh.ghostty,title:.*btop.*
windowrule=isfloating:1,width:1000,height:700,appid:com.mitchellh.ghostty,title:.*yazi.*

# LibreOffice tip dialog
windowrule=isfloating:1,appid:soffice,title:Tip of the Day

# Layer rules
layerrule=layer_name:waybar,noblur:1,noanim:1
layerrule=layer_name:mako,noanim:0

# ── Bindings ──────────────────────────────────────────────────────────────────

# Apps
bind=SUPER,Return,spawn,ghostty
bind=SUPER,t,spawn,kitty
bind=SUPER,q,killclient,
bind=SUPER+SHIFT,b,spawn,zen-browser
bind=SUPER+SHIFT,x,spawn,chromium
bind=SUPER+SHIFT,e,spawn,thunar
bind=SUPER,d,spawn,rofi -show drun

# Clipboard
bind=SUPER+SHIFT,v,spawn,sh -c 'cliphist list | rofi -dmenu -theme ~/.config/rofi/clipboard.rasi -p "󰅍" | cliphist decode | wl-copy'
bind=SUPER+CTRL,Delete,spawn,sh -c 'cliphist wipe && notify-send "Clipboard cleared"'

# WM control
bind=SUPER+SHIFT,c,reload_config,
bind=SUPER,F2,spawn,~/.config/rofi/power-menu.sh
bind=SUPER+CTRL,u,spawn,systemctl poweroff
bind=SUPER+CTRL,r,spawn,systemctl reboot

# Lock / suspend
bind=CTRL+SHIFT,l,spawn,swaylock -f -C ~/.config/swaylock/config
bind=SUPER+CTRL,l,spawn,sh -c 'swaylock -f -C ~/.config/swaylock/config && systemctl suspend'

# Cycle windows
bind=SUPER,Tab,focusstack,1

# Focus (vim + arrows)
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,Left,focusdir,left
bind=SUPER,Down,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,Right,focusdir,right

# Move windows (vim + arrows)
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Right,exchange_client,right

# Layouts (s=scroller, m=monocle, v=vtile, w=deck, e=cycle)
bind=SUPER,s,setlayout,scroller
bind=SUPER,m,setlayout,monocle
bind=SUPER,v,setlayout,vertical_tile
# bind=SUPER,b,setlayout,horizontal_tile #find what is the  mode for horizontal tiling
bind=SUPER,w,setlayout,deck
bind=SUPER,e,switch_layout,
bind=SUPER+CTRL,s,switch_proportion_preset,
bind=SUPER+CTRL,m,set_proportion,1.0
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,space,togglefloating,

# Master count
bind=SUPER,i,incnmaster,+1
bind=SUPER,p,incnmaster,-1

# Resize master/stack split (tile, vertical_tile, deck, etc.)
bind=SUPER+CTRL,l,setmfact,+0.05
bind=SUPER+CTRL,h,setmfact,-0.05
bind=SUPER+CTRL,Right,setmfact,+0.05
bind=SUPER+CTRL,Left,setmfact,-0.05

# Scratchpad
bind=SUPER+SHIFT,minus,minimized,
bind=SUPER,minus,toggle_scratchpad,

# Tags 1–9
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9
# Toggle overview
# bind=SUPER,0,view,0

# Move window to tag
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# Move window to other monitor
bind=SUPER+CTRL+SHIFT,Right,tagmon,right
bind=SUPER+CTRL+SHIFT,Left,tagmon,left
bind=SUPER+CTRL+SHIFT,Down,tagmon,down
bind=SUPER+CTRL+SHIFT,Up,tagmon,up

# Media keys
bind=NONE,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/vol-up.sh
bind=NONE,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/vol-down.sh
bind=NONE,XF86AudioMute,spawn,~/.config/mango/scripts/vol-mute.sh
bind=NONE,XF86AudioMicMute,spawn,pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/bright-up.sh
bind=NONE,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/bright-down.sh
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous

# Screenshots
bind=SUPER,Print,spawn,~/.config/mango/scripts/screenshot-region-file.sh
bind=SUPER+SHIFT,p,spawn,~/.config/mango/scripts/screenshot-full-file.sh
bind=SUPER+SHIFT,s,spawn,~/.config/mango/scripts/screenshot-clip.sh

# Recording
bind=SUPER+SHIFT,r,spawn,~/.config/mango/scripts/record-start.sh
bind=SUPER+CTRL,Escape,spawn,sh -c 'pkill -INT wf-recorder && notify-send "Recording saved"'

# Misc
bind=SUPER,F10,spawn,~/.config/mango/scripts/toggle-mouse.sh

# Mouse
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Gestures
gesturebind=NONE,left,3,focusdir,right
gesturebind=NONE,right,3,focusdir,left
gesturebind=NONE,up,3,focusdir,up
gesturebind=NONE,down,3,focusdir,down
gesturebind=none,up,4,viewtoleft_have_client,
gesturebind=none,down,4,viewtoright_have_client,
gesturebind=none,left,4,viewtoright_have_client,
gesturebind=none,right,4,viewtoleft_have_client,
